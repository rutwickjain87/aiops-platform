# oom.yaml — OOMKilled scenario for K8s Doctor testing
#
# Deploys a busybox container that continuously allocates memory until
# the kernel OOM-killer terminates it. The 32Mi memory limit is
# intentionally too small to contain the allocation loop.
#
# Apply:
#   kubectl apply -f fixtures/oom.yaml --context kind-doctor-lab
#
# Diagnose:
#   make run-k8s-doctor K8S_RESOURCE=oom-demo K8S_SYMPTOM=OOMKilled
---
apiVersion: v1
kind: Namespace
metadata:
  name: doctor-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
  namespace: doctor-lab
  labels:
    app: oom-demo
    scenario: oomkilled
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
        scenario: oomkilled
    spec:
      containers:
        - name: memory-hog
          image: busybox:1.36
          # Allocate 128M in a loop — exceeds the 32Mi limit every ~5s
          command:
            - sh
            - -c
            - |
              echo "INFO: starting memory allocation loop"
              while true; do
                echo "INFO: allocating 128M..."
                dd if=/dev/zero bs=1M count=128 | tail -c 1
                sleep 1
              done
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"   # deliberately too small — triggers OOMKilled
              cpu: "100m"
