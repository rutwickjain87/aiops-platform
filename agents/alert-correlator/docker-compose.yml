version: "3.9"

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: alert-correlator-pgvector
    environment:
      POSTGRES_USER: alertcorr
      POSTGRES_PASSWORD: alertcorr
      POSTGRES_DB: alerts
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alertcorr -d alerts"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector_data:
