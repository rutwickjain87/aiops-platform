name: ai-pr-review

# Automatically posts an AI-powered security review comment on every PR.
# The review is idempotent: re-runs update the same comment, not create new ones.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY  — Anthropic API key for the LLM
#   GITHUB_TOKEN       — Automatically provided by GitHub Actions

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip bot-created PRs (Dependabot, etc.) to avoid infinite loops
    if: github.actor != 'dependabot[bot]'

    # Force Node.js 24 for all JavaScript actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install agent dependencies
        run: |
          cd agents/pr-reviewer
          uv venv
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: Run PR security review
        run: |
          cd agents/pr-reviewer
          source .venv/bin/activate
          python reviewer.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --post-comment \
            --quiet

      - name: Handle review failure gracefully
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- ai-reviewer:v1 -->';
            const body = `${marker}\n\n## 🔒 AI Security Review\n\n` +
              `⚠️ The automated security review could not complete. ` +
              `Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n` +
              `*Please perform a manual security review before merging.*`;

            // Try to update existing comment or create new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
