# Ruff linting + formatting config
# Docs: https://docs.astral.sh/ruff/configuration/

[lint]
select = ["E", "F", "W", "I"]   # pycodestyle errors/warnings, pyflakes, isort
ignore = [
    "E501",  # line too long — handled by formatter
]

[lint.per-file-ignores]
# Existing agent files use `from __future__ import annotations` at the top
# of each import block intentionally. Suppress isort's blank-line requirement
# for those files so we don't reformat working production code.
"agents/**" = ["I001"]
"scripts/**" = ["I001"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

exclude = [
    ".venv",
    "venv",
    "__pycache__",
    ".git",
    "htmlcov",
    "agents/log-intelligence/.venv",
    "agents/_scratch/.venv",
]
