# observability/loki/loki-config.yml
#
# Minimal single-node Loki config for local development.
# Uses local filesystem storage — no S3/GCS required.
# Data is persisted in the loki-data Docker volume.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# Schema — must use v13 for Loki 3.x
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention — keep logs for 30 days locally
limits_config:
  retention_period: 720h      # 30 days
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_query_series: 5000

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem

# Ruler (optional alerting on logs — off for local dev)
ruler:
  alertmanager_url: http://localhost:9093
